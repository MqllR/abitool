name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          branches: '["main"]'
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release binaries
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          VERSION: v${{ steps.semantic.outputs.new_release_version }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/MqllR/abitool/cmd.Version=${VERSION}"

          GOOS=linux  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/abitool_linux_amd64  .
          GOOS=linux  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/abitool_linux_arm64  .
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/abitool_darwin_amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/abitool_darwin_arm64 .

          tar -czf dist/abitool_linux_amd64.tar.gz  -C dist abitool_linux_amd64
          tar -czf dist/abitool_linux_arm64.tar.gz  -C dist abitool_linux_arm64
          tar -czf dist/abitool_darwin_amd64.tar.gz -C dist abitool_darwin_amd64
          tar -czf dist/abitool_darwin_arm64.tar.gz -C dist abitool_darwin_arm64

      - name: Upload release assets
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.semantic.outputs.new_release_version }}
        run: |
          gh release upload "${TAG}" \
            dist/abitool_linux_amd64.tar.gz \
            dist/abitool_linux_arm64.tar.gz \
            dist/abitool_darwin_amd64.tar.gz \
            dist/abitool_darwin_arm64.tar.gz
