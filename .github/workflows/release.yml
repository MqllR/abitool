name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Semantic Release (dry run)
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog@6.0.2
            @semantic-release/git@10.0.1
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release binaries
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          VERSION: v${{ steps.semantic.outputs.new_release_version }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.Version=${VERSION}"

          GOOS=linux  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/abitool_linux_amd64  ./cmd/
          GOOS=linux  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/abitool_linux_arm64  ./cmd/
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/abitool_darwin_amd64 ./cmd/
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/abitool_darwin_arm64 ./cmd/

      - name: Semantic Release
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog@6.0.2
            @semantic-release/git@10.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
